<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especialidades UX - PUCP</title>
    <!-- Tailwind CSS para estilos rápidos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar JSX directamente en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Icono genérico para Lucide
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const specialties = [
            {
                id: 'strategy',
                title: 'UX Strategy',
                role: 'UX Strategist',
                icon: 'target',
                desc: 'Vincula metas de negocio con necesidades del usuario para dar valor al producto.',
                color: 'bg-blue-500',
                borderColor: 'border-blue-500',
                lightColor: 'bg-blue-50',
                pucpTip: 'Para asegurar que la campaña digital no sea solo "bonita", sino que cumpla objetivos de negocio medibles.'
            },
            {
                id: 'research',
                title: 'UX Research',
                role: 'UX Researcher',
                icon: 'search',
                desc: 'Investiga comportamientos y motivaciones mediante métodos cuali y cuanti.',
                color: 'bg-purple-500',
                borderColor: 'border-purple-500',
                lightColor: 'bg-purple-50',
                pucpTip: 'Lleva el "conocimiento del consumidor" al siguiente nivel: analizando el uso real del producto.'
            },
            {
                id: 'ia',
                title: 'Information Architecture',
                role: 'IA / UX Designer',
                icon: 'sitemap',
                desc: 'Organiza el contenido y la navegación para que todo sea fácil de encontrar.',
                color: 'bg-green-500',
                borderColor: 'border-green-500',
                lightColor: 'bg-green-50',
                pucpTip: 'Fundamental para organizar landings complejas o flujos de conversión de e-commerce.'
            },
            {
                id: 'content',
                title: 'Content Strategy',
                role: 'Content Designer / UX Writer',
                icon: 'pen-tool',
                desc: 'Planifica y redacta mensajes útiles para guiar al usuario en la interfaz.',
                color: 'bg-orange-500',
                borderColor: 'border-orange-500',
                lightColor: 'bg-orange-50',
                pucpTip: 'Donde el Copywriting se vuelve funcional: menos persuasión vacía, más utilidad directa.'
            },
            {
                id: 'interaction',
                title: 'Interaction Design',
                role: 'Interaction Designer (IxD)',
                icon: 'mouse-pointer-2',
                desc: 'Define cómo responde el sistema ante cada clic o gesto del usuario.',
                color: 'bg-red-500',
                borderColor: 'border-red-500',
                lightColor: 'bg-red-50',
                pucpTip: 'Define la "personalidad" del producto a través del movimiento y la respuesta táctil.'
            },
            {
                id: 'visual',
                title: 'Visual Design',
                role: 'UI Designer / Visual Designer',
                icon: 'palette',
                desc: 'Crea la estética, color y tipografía para guiar la atención y el branding.',
                color: 'bg-pink-500',
                borderColor: 'border-pink-500',
                lightColor: 'bg-pink-50',
                pucpTip: 'La evolución del Director de Arte: diseño basado en sistemas, no solo en piezas sueltas.'
            },
            {
                id: 'eng',
                title: 'Design Engineering',
                role: 'Design Engineer / UI Dev',
                icon: 'code-2',
                desc: 'Traduce el diseño en código funcional y construye sistemas de diseño.',
                color: 'bg-cyan-500',
                borderColor: 'border-cyan-500',
                lightColor: 'bg-cyan-50',
                pucpTip: 'Permite que las ideas creativas sean técnicamente viables y de alta calidad.'
            }
        ];

        function App() {
            const [selected, setSelected] = useState(specialties[0]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-10 text-center">
                            <h1 className="text-4xl font-extrabold text-gray-900 mb-3 tracking-tight">Especialidades en Productos Digitales</h1>
                            <p className="text-lg text-gray-600">Haz clic en cada área para conocer el rol que la ejecuta y su valor en Publicidad.</p>
                        </header>

                        <div className="grid md:grid-cols-2 gap-8 items-start">
                            {/* Lista de especialidades */}
                            <div className="space-y-3">
                                {specialties.map((s) => (
                                    <button
                                        key={s.id}
                                        onClick={() => setSelected(s)}
                                        className={`w-full flex items-center p-4 rounded-2xl transition-all duration-300 border-2 text-left ${
                                            selected.id === s.id 
                                                ? `${s.borderColor} shadow-lg transform scale-[1.03] ${s.lightColor}` 
                                                : 'border-transparent bg-white hover:bg-white hover:shadow-md'
                                        }`}
                                    >
                                        <div className={`p-3 rounded-xl ${s.color} text-white mr-4`}>
                                            <Icon name={s.icon} className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-gray-800 text-lg">{s.title}</h3>
                                            <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest">{s.role}</p>
                                        </div>
                                    </button>
                                ))}
                            </div>

                            {/* Tarjeta de Detalle */}
                            <div className="sticky top-8">
                                <div className={`rounded-3xl p-8 shadow-2xl bg-white border-t-[12px] ${selected.borderColor} transition-all duration-500`}>
                                    <div className="flex items-center mb-8">
                                        <div className={`p-5 rounded-2xl ${selected.color} text-white mr-5 shadow-inner`}>
                                            <Icon name={selected.icon} className="w-10 h-10" />
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-bold text-gray-900 leading-none">{selected.title}</h2>
                                            <div className="inline-flex items-center px-3 py-1 rounded-full bg-gray-100 text-gray-500 text-sm font-bold mt-3 border border-gray-200">
                                                ROL: {selected.role}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div className="bg-gray-50 p-6 rounded-2xl italic text-gray-700 text-lg leading-relaxed border-l-8 border-gray-200">
                                            "{selected.desc}"
                                        </div>
                                        
                                        <div className="pt-6 border-t border-gray-100">
                                            <h4 className="text-sm font-black text-gray-400 uppercase mb-4 flex items-center">
                                                <span className="mr-2">💡</span> ¿Por qué es clave en Publicidad?
                                            </h4>
                                            <p className="text-gray-600 leading-relaxed">
                                                {selected.pucpTip}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-6 bg-blue-600 text-white p-5 rounded-2xl flex items-start gap-4 shadow-lg shadow-blue-200">
                                    <div className="bg-white/20 p-2 rounded-lg">
                                        <Icon name="info" className="w-5 h-5 text-white" />
                                    </div>
                                    <p className="text-sm font-medium leading-snug">
                                        <strong>Dato Docente:</strong> Muchos publicistas de la PUCP inician en <strong>Content Strategy</strong> o <strong>UX Strategy</strong> debido a su sólida base en comunicación estratégica y redacción.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
